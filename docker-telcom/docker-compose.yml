
# ============================================================
# Networks
# ============================================================
networks:
  teleco-net:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  customer-db-data:
    driver: local
  product-db-data:
    driver: local
  order-db-data:
    driver: local
  subscription-db-data:
    driver: local
  customer-pgadmin-data:
    driver: local
  kafka-data:
    driver: local

# ============================================================
# Services
# ============================================================
services:

  # ----------------------------------------------------------
  # customer-service PostgreSQL
  # ----------------------------------------------------------
  customer-db:
    image: postgres:16-alpine
    container_name: customer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: customer_user
      POSTGRES_PASSWORD: customer_pass
    ports:
      - "5433:5432"
    volumes:
      - customer-db-data:/var/lib/postgresql/data
      - ./init-scripts/customer-service:/docker-entrypoint-initdb.d:ro
    networks:
      - teleco-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U customer_user -d customer_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # product-catalog-service PostgreSQL
  # ----------------------------------------------------------
  telco-product-db:
    image: postgres:16-alpine
    container_name: telco-product-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: product_catalog_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_pass
    ports:
      - "5434:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - teleco-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U product_user -d product_catalog_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # order-service PostgreSQL
  # ----------------------------------------------------------
  telco-order-db:
    image: postgres:16-alpine
    container_name: telco-order-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "5435:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./init-scripts/order-service:/docker-entrypoint-initdb.d:ro
    networks:
      - teleco-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U order_user -d order_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # Redis Cache for product-catalog-service
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - teleco-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # customer-service pgAdmin
  # ----------------------------------------------------------
  customer-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: customer-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@teleco.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - customer-pgadmin-data:/var/lib/pgadmin
    networks:
      - teleco-net
    depends_on:
      customer-db:
        condition: service_healthy

  # ----------------------------------------------------------
  # Keycloak Server
  # ----------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak-server
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - teleco-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e \"GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n\" >&3;grep \"200 OK\" <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # Apache Kafka (KRaft mode)
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-broker
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - teleco-net

  # ----------------------------------------------------------
  # subscription-service PostgreSQL
  # ----------------------------------------------------------
  subscription-db:
    image: postgres:16-alpine
    container_name: subscription-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: subscription_db
      POSTGRES_USER: subscription_user
      POSTGRES_PASSWORD: subscription_pass
    ports:
      - "5436:5432"
    volumes:
      - subscription-db-data:/var/lib/postgresql/data
      - ./init-scripts/subscription-service:/docker-entrypoint-initdb.d:ro
    networks:
      - teleco-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U subscription_user -d subscription_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
