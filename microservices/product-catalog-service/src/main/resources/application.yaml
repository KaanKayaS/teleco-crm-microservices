spring:
  application:
    name: product-catalog-service
  config:
    import: "optional:configserver:http://localhost:8888"

  # -------------------------------------------------------
  # DataSource — telco-product-db (Docker port 5434)
  # -------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5434/product_catalog_db
    username: product_user
    password: product_pass
    driver-class-name: org.postgresql.Driver

  # -------------------------------------------------------
  # JPA / Hibernate
  # -------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # -------------------------------------------------------
  # Redis Cache
  # -------------------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379

  # -------------------------------------------------------
  # Kafka
  # -------------------------------------------------------
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        spring.json.add.type.headers: true

  # -------------------------------------------------------
  # OAuth2 Resource Server — Keycloak
  # -------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/telcox-realm
          jwk-set-uri: http://localhost:8080/realms/telcox-realm/protocol/openid-connect/certs

# -------------------------------------------------------
# Server
# -------------------------------------------------------
server:
  port: 8083

# -------------------------------------------------------
# Eureka
# -------------------------------------------------------
eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# -------------------------------------------------------
# Springdoc / Swagger UI
# -------------------------------------------------------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging:
  level:
    org.springframework.security: DEBUG
