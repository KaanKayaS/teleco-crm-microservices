spring:
  application:
    name: subscription-service
  config:
    import: "optional:configserver:http://localhost:8888"

  # -------------------------------------------------------
  # DataSource — subscription-db (Docker port 5436)
  # -------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5436/subscription_db
    username: subscription_user
    password: subscription_pass
    driver-class-name: org.postgresql.Driver

  # -------------------------------------------------------
  # JPA / Hibernate
  # -------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # -------------------------------------------------------
  # Kafka
  # -------------------------------------------------------
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: subscription-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

  # -------------------------------------------------------
  # OAuth2 Resource Server — Keycloak
  # -------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/telcox-realm

# -------------------------------------------------------
# Server
# -------------------------------------------------------
server:
  port: 8086

# -------------------------------------------------------
# Eureka
# -------------------------------------------------------
eureka:
  client:
    enabled: false          # Config Server / Eureka çalışmıyorsa skip
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# -------------------------------------------------------
# Springdoc / Swagger UI
# -------------------------------------------------------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
