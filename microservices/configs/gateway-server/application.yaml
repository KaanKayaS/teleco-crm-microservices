# Gateway Server Config
spring:
  main:
    web-application-type: servlet
  cloud:
    gateway:
      mvc:
        routes:
          # Servisler eklenince buraya rota ekleyin, örnek:
          # - id: customer-service
          #   uri: lb://customer-service
          #   predicates:
          #     - Path=/api/customers/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
