spring:
  application:
    name: bff-server
  config:
    import: "optional:configserver:http://localhost:8888"

  # -------------------------------------------------------
  # OAuth2 Resource Server — JWT doğrulama (Keycloak)
  # -------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/telcox-realm

server:
  port: 9090

# -------------------------------------------------------
# API Gateway base URL — tüm mikroservis istekleri buradan
# -------------------------------------------------------
gateway:
  base-url: http://localhost:9000

# -------------------------------------------------------
# CORS — Angular dev server
# -------------------------------------------------------
cors:
  allowed-origins: "http://localhost:4200"

# -------------------------------------------------------
# Eureka
# -------------------------------------------------------
eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# -------------------------------------------------------
# Swagger UI
# -------------------------------------------------------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
