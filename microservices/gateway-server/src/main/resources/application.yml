spring:
  application:
    name: gateway-server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/telcox-realm
          jwk-set-uri: http://localhost:8080/realms/telcox-realm/protocol/openid-connect/certs
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-service
              uri: lb://identity-service
              predicates:
                - Path=/api/v1/auth/**
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
            - id: subscription-service
              uri: lb://subscription-service
              predicates:
                - Path=/api/v1/subscriptions/**
            - id: usage-service
              uri: lb://usage-service
              predicates:
                - Path=/api/v1/usage/**
            - id: product-catalog-tariffs
              uri: lb://product-catalog-service
              predicates:
                - Path=/api/v1/tariffs/**
            - id: product-catalog-addons
              uri: lb://product-catalog-service
              predicates:
                - Path=/api/v1/addons/**
            - id: billing-service
              uri: lb://billing-service
              predicates:
                - Path=/api/v1/invoices/**,/api/v1/billing/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**
            - id: ticket-service
              uri: lb://ticket-service
              predicates:
                - Path=/api/v1/tickets/**

server:
  port: 9000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true


