spring:
  application:
    name: config-server
  profiles:
    active: native                    # Yerel dosya sisteminden config okur (Git yerine)
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs/{application}  # Her servis kendi klasöründen okunur

server:
  port: 8888                          # Config Server standart portu

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
