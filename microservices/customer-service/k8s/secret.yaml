apiVersion: v1
kind: Secret
metadata:
  name: customer-service-secret
  namespace: telecom-crm
  labels:
    app.kubernetes.io/name: customer-service
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: telecom-crm
type: Opaque
# -------------------------------------------------------
# Base64 encoded credentials
# echo -n 'customer_user' | base64 → Y3VzdG9tZXJfdXNlcg==
# echo -n 'customer_pass' | base64 → Y3VzdG9tZXJfcGFzcw==
#
# IMPORTANT: In production, use Sealed Secrets, Vault,
# or an external secret manager instead of plain Secrets.
# -------------------------------------------------------
data:
  DB_USERNAME: Y3VzdG9tZXJfdXNlcg==
  DB_PASSWORD: Y3VzdG9tZXJfcGFzcw==
