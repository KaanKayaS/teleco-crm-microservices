apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: telecom-crm
  labels:
    app.kubernetes.io/name: customer-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: telecom-crm
    app.kubernetes.io/version: "0.0.1-SNAPSHOT"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-service
  # -------------------------------------------------------
  # Rolling Update — zero-downtime deployment
  # -------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: telecom-crm
    spec:
      # -------------------------------------------------------
      # Security Context (Pod level)
      # -------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      # -------------------------------------------------------
      # Graceful shutdown
      # -------------------------------------------------------
      terminationGracePeriodSeconds: 30

      # -------------------------------------------------------
      # Pod Anti-Affinity — spread pods across nodes
      # -------------------------------------------------------
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - customer-service
                topologyKey: kubernetes.io/hostname

      containers:
        - name: customer-service
          image: telecom-crm/customer-service:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP

          # -------------------------------------------------------
          # Environment Variables
          # -------------------------------------------------------
          env:
            # From ConfigMap
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: customer-service-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: customer-service-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: customer-service-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: customer-service-config
                  key: DB_NAME
            - name: EUREKA_URL
              valueFrom:
                configMapKeyRef:
                  name: customer-service-config
                  key: EUREKA_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: customer-service-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: customer-service-config
                  key: SERVER_PORT
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: customer-service-config
                  key: JAVA_OPTS

            # From Secret
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: customer-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: customer-service-secret
                  key: DB_PASSWORD

          # -------------------------------------------------------
          # Resource Management
          # -------------------------------------------------------
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # -------------------------------------------------------
          # Startup Probe — gives Spring Boot time to initialize
          # -------------------------------------------------------
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 20
            timeoutSeconds: 3

          # -------------------------------------------------------
          # Liveness Probe — restart if unhealthy
          # -------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3

          # -------------------------------------------------------
          # Readiness Probe — stop traffic if not ready
          # -------------------------------------------------------
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

          # -------------------------------------------------------
          # Security Context (Container level)
          # -------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          # -------------------------------------------------------
          # Volume Mounts — file uploads persistent storage
          # -------------------------------------------------------
          volumeMounts:
            - name: upload-storage
              mountPath: /app/uploads

      # -------------------------------------------------------
      # Volumes
      # -------------------------------------------------------
      volumes:
        - name: upload-storage
          emptyDir: {}
          # NOTE: For production, replace emptyDir with a PersistentVolumeClaim:
          # persistentVolumeClaim:
          #   claimName: customer-service-uploads-pvc
