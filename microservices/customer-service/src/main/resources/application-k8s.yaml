# -------------------------------------------------------
# Kubernetes Profile — activated via SPRING_PROFILES_ACTIVE=k8s
# Environment variables are injected from ConfigMap & Secret
# -------------------------------------------------------

spring:
  application:
    name: customer-service

  # -------------------------------------------------------
  # DataSource — uses K8s service DNS
  # -------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST:customer-db}:${DB_PORT:5432}/${DB_NAME:customer_db}
    username: ${DB_USERNAME:customer_user}
    password: ${DB_PASSWORD:customer_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: CustomerHikariPool

  # -------------------------------------------------------
  # JPA / Hibernate
  # -------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # -------------------------------------------------------
  # Kafka
  # -------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

  # -------------------------------------------------------
  # File Upload
  # -------------------------------------------------------
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

# -------------------------------------------------------
# Server
# -------------------------------------------------------
server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

# -------------------------------------------------------
# Graceful Shutdown
# -------------------------------------------------------
spring.lifecycle:
  timeout-per-shutdown-phase: 20s

# -------------------------------------------------------
# Upload Directory
# -------------------------------------------------------
app:
  upload:
    dir: uploads/documents

# -------------------------------------------------------
# Eureka — K8s internal DNS
# -------------------------------------------------------
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# -------------------------------------------------------
# Actuator — required for K8s probes
# -------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# -------------------------------------------------------
# Springdoc
# -------------------------------------------------------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
