<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="md:flex md:items-center md:justify-between mb-6">
    <div class="flex-1 min-w-0">
      <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">
        Support Tickets
      </h2>
    </div>
    <div class="mt-4 flex md:mt-0 md:ml-4">
      <button (click)="showForm = !showForm" type="button" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
        {{ showForm ? 'Cancel' : 'New Ticket' }}
      </button>
    </div>
  </div>

  <div *ngIf="showForm" class="bg-white shadow sm:rounded-lg mb-8">
    <div class="px-4 py-5 sm:p-6">
      <h3 class="text-lg leading-6 font-medium text-gray-900">Create New Ticket</h3>
      <div class="mt-2 max-w-xl text-sm text-gray-500">
        <p>Describe your issue and our support team will get back to you.</p>
      </div>
      <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()" class="mt-5 sm:flex sm:items-start flex-col gap-4">
        <div class="w-full max-w-xs">
          <label class="block text-sm font-medium text-gray-700">Category</label>
          <select formControlName="category" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
            <option value="FAULT">Fault / Outage</option>
            <option value="COMPLAINT">Complaint</option>
            <option value="REQUEST">Service Request</option>
          </select>
        </div>
        <div class="w-full max-w-xs">
          <label class="block text-sm font-medium text-gray-700">Priority</label>
          <select formControlName="priority" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
            <option value="LOW">Low</option>
            <option value="MID">Medium</option>
            <option value="HIGH">High</option>
          </select>
        </div>
        <div class="w-full max-w-2xl">
          <label class="block text-sm font-medium text-gray-700">Description</label>
          <textarea formControlName="description" rows="4" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 mt-1 block w-full sm:text-sm border border-gray-300 rounded-md p-2"></textarea>
        </div>
        <button type="submit" [disabled]="!ticketForm.valid" class="mt-3 w-full inline-flex items-center justify-center px-4 py-2 border border-transparent shadow-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:mt-0 sm:w-auto sm:text-sm disabled:bg-gray-400">
          Submit
        </button>
      </form>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center mt-8">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>

  <div *ngIf="!loading && tickets.length === 0" class="text-center text-gray-500 italic mt-8">
    No tickets found.
  </div>

  <div *ngIf="!loading && tickets.length > 0" class="bg-white shadow overflow-hidden sm:rounded-md">
    <ul role="list" class="divide-y divide-gray-200">
      <li *ngFor="let ticket of tickets">
        <div class="px-4 py-4 sm:px-6 hover:bg-gray-50">
          <div class="flex items-center justify-between">
            <p class="text-sm font-medium text-blue-600 truncate">
              {{ ticket.category }}
            </p>
            <div class="ml-2 flex-shrink-0 flex">
              <p class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                 [ngClass]="{
                   'bg-green-100 text-green-800': ticket.status === 'RESOLVED',
                   'bg-yellow-100 text-yellow-800': ticket.status === 'IN_PROGRESS',
                   'bg-red-100 text-red-800': ticket.status === 'OPEN'
                 }">
                {{ ticket.status }}
              </p>
            </div>
          </div>
          <div class="mt-2 sm:flex sm:justify-between">
            <div class="sm:flex">
              <p class="flex items-center text-sm text-gray-500">
                {{ ticket.description }}
              </p>
            </div>
            <div class="mt-2 flex items-center text-sm text-gray-500 sm:mt-0">
              <p>
                Priority: <span class="font-bold">{{ ticket.priority }}</span>
              </p>
            </div>
          </div>
        </div>
      </li>
    </ul>
  </div>
</div>
